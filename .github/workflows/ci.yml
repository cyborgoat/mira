name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend API tests
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync --extra dev

      - name: Run pytest with coverage
        run: |
          cd apps/api
          uv run pytest --cov=mira_api --cov-report=term --cov-report=xml --cov-report=html -v

      - name: Check coverage threshold
        run: |
          cd apps/api
          uv run coverage report --fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./apps/api/coverage.xml
          flags: backend
          name: backend-${{ matrix.python-version }}

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: apps/api/htmlcov/

      - name: Check Alembic migrations
        run: |
          cd apps/api
          uv run alembic check

  # Frontend build and type checking
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: TypeScript type check
        run: |
          cd apps/web
          npx tsc --noEmit

      - name: Build production bundle
        run: |
          cd apps/web
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/dist/

  # Integration test with PostgreSQL
  integration:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync --extra dev

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres createuser --superuser "$USER"
          createdb mira_test

      - name: Run migrations on PostgreSQL
        env:
          MIRA_DATABASE_URL: postgresql:///mira_test
        run: |
          cd apps/api
          uv run alembic upgrade head

      - name: Run tests against PostgreSQL
        env:
          MIRA_DATABASE_URL: postgresql:///mira_test
          MIRA_JWT_SECRET: test-secret-for-ci
        run: |
          cd apps/api
          uv run pytest -v

      - name: Check database after tests
        run: |
          psql -d mira_test -c "\dt"
          psql -d mira_test -c "SELECT COUNT(*) FROM alembic_version;"

  # Linting and code quality
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync --extra dev

      - name: Run ruff linter
        run: |
          cd apps/api
          uv run ruff check mira_api/ --output-format=github

      - name: Run ruff formatter check
        run: |
          cd apps/api
          uv run ruff format --check mira_api/

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  # Summary job (requires all others to pass)
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration, lint, security]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.backend.result }}" == "success" &&
                "${{ needs.frontend.result }}" == "success" &&
                "${{ needs.integration.result }}" == "success" &&
                "${{ needs.lint.result }}" == "success" &&
                "${{ needs.security.result }}" == "success" ]]; then
            echo "✅ All CI checks passed!"
            exit 0
          else
            echo "❌ Some CI checks failed"
            echo "Backend: ${{ needs.backend.result }}"
            echo "Frontend: ${{ needs.frontend.result }}"
            echo "Integration: ${{ needs.integration.result }}"
            echo "Lint: ${{ needs.lint.result }}"
            echo "Security: ${{ needs.security.result }}"
            exit 1
          fi
