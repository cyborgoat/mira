version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mira-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mira}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mira}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mira-network

  # Mira API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mira-api
    environment:
      # Database
      MIRA_DATABASE_URL: postgresql://${POSTGRES_USER:-mira}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mira}

      # Auth
      MIRA_JWT_SECRET: ${MIRA_JWT_SECRET:?MIRA_JWT_SECRET is required}
      MIRA_JWT_ACCESS_EXPIRY: ${MIRA_JWT_ACCESS_EXPIRY:-900}
      MIRA_JWT_REFRESH_EXPIRY: ${MIRA_JWT_REFRESH_EXPIRY:-604800}
      MIRA_BCRYPT_ROUNDS: ${MIRA_BCRYPT_ROUNDS:-12}

      # CORS
      MIRA_CORS_ORIGINS: ${MIRA_CORS_ORIGINS:-http://localhost,http://localhost:80}

      # Workspace
      MIRA_WORKSPACE_DIR: /workspace

      # Config
      MIRA_DEBUG: ${MIRA_DEBUG:-false}
      MIRA_MAX_UPLOAD_BYTES: ${MIRA_MAX_UPLOAD_BYTES:-2097152}
      MIRA_DEFAULT_LANGUAGE: ${MIRA_DEFAULT_LANGUAGE:-en}
    volumes:
      - workspace-data:/workspace
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - mira-network
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        alembic upgrade head &&
        echo 'Database migrations complete. Starting API...' &&
        uvicorn mira_api.main:app --host 0.0.0.0 --port 8000
      "

  # Mira Web Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: mira-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - mira-network

# Named volumes for persistent data
volumes:
  postgres-data:
    driver: local
  workspace-data:
    driver: local

# Network for inter-service communication
networks:
  mira-network:
    driver: bridge
